<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход – Хотел Ел Кастела</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #f9d342; --dark: #292826; }
    body {
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, #4a4845 100%);
      display: flex; flex-direction: column; justify-content: center;
    }
    .card { border: none; border-radius: 16px; }
    .btn-gold { background: var(--gold); color: var(--dark); font-weight: 700; border: none; }
    .btn-gold:hover { background: #e8c200; }
    .form-control:focus { border-color: var(--gold); box-shadow: 0 0 0 .2rem rgba(249,211,66,.35); }
    .brand-link { color: var(--gold); text-decoration: none; font-weight: 700; }
    .brand-link:hover { color: #e8c200; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

      <div class="text-center mb-4">
        <a href="index.html" class="brand-link fs-3">🏨 Ел Кастела</a>
      </div>

      <div class="card shadow-lg p-4 p-md-5">
        <h2 class="text-center fw-bold mb-1">Вход</h2>
        <p class="text-center text-muted mb-4">Влезте в своя акаунт</p>

        <form>
          <div class="mb-3">
            <label for="login-email" class="form-label fw-semibold">Имейл адрес</label>
            <input type="email" id="login-email" class="form-control" placeholder="dimitar@example.com" required>
          </div>

          <div class="mb-3">
            <label for="login-password" class="form-label fw-semibold">Парола</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check mb-0">
              <input type="checkbox" class="form-check-input" id="remember">
              <label class="form-check-label text-muted" for="remember">Запомни ме</label>
            </div>
            <a href="#" class="brand-link small">Забравена парола?</a>
          </div>

          <button type="submit" class="btn btn-gold w-100 py-2 fs-5">Вход</button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          Нямате акаунт? <a href="register.html" class="brand-link">Регистрирайте се</a>
        </p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
